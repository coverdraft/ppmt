# PPMT Default Configuration

# SAX Symbolization
sax:
  alphabet_size: 8        # Number of SAX symbols (a, b, c, d, e, f, g, h)
  window_size: 10         # PAA window size (candles per SAX block)
  strategy: "ohlcv"       # ohlcv | close | typical_price

# Trie Architecture
trie:
  max_depth: 50           # Maximum trie depth (SAX blocks)
  min_occurrences: 3      # Minimum occurrences to store a pattern
  fuzzy_threshold: 0.85   # Fuzzy match similarity threshold (0-1)

# 4-Level Weights (default for established assets)
weights:
  default:
    n1_universal: 0.10
    n2_asset_class: 0.30
    n3_per_asset: 0.30
    n4_per_asset_regime: 0.30
  # Meme/new assets: more weight on asset class
  meme:
    n1_universal: 0.10
    n2_asset_class: 0.60
    n3_per_asset: 0.20
    n4_per_asset_regime: 0.10

# Asset Classes
asset_classes:
  blue_chip: ["BTC/USDT", "ETH/USDT"]
  large_cap: ["BNB/USDT", "SOL/USDT", "XRP/USDT", "ADA/USDT"]
  mid_cap: ["LINK/USDT", "AVAX/USDT", "DOT/USDT", "MATIC/USDT"]
  defi: ["UNI/USDT", "AAVE/USDT", "CRV/USDT", "MKR/USDT"]
  meme: ["DOGE/USDT", "SHIB/USDT", "PEPE/USDT", "FLOKI/USDT"]
  new_launch: []  # Dynamically populated

# Regime Detection
regime:
  lookback: 100           # Candles for regime detection
  volatility_window: 20   # Window for volatility calculation
  trend_window: 50        # Window for trend detection
  regimes:
    - trending_up
    - trending_down
    - ranging
    - volatile
    - quiet

# Data Collection
data:
  exchange: "binance"
  rate_limit: true
  cache_dir: "~/.ppmt/data"

# Storage
storage:
  db_path: "~/.ppmt/ppmt.db"
  journal_mode: "WAL"

# Risk Management
risk:
  max_position_size_pct: 0.02   # 2% of capital per trade
  max_daily_loss_pct: 0.05      # 5% max daily loss
  max_drawdown_pct: 0.15        # 15% max drawdown
  min_risk_reward: 1.5          # Minimum risk:reward ratio
  max_open_positions: 5

# Signal Generation
signal:
  min_confidence: 0.60          # Minimum confidence to generate signal
  unknown_block_exit: true      # Exit on unknown block
  trailing_stop_activation: 0.03  # 3% profit to activate trailing
  trailing_stop_distance: 0.015   # 1.5% trailing distance

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
